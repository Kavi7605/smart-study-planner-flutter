name: smart_study_planner
description: Smart Study Planner & Exam Preparation Tracker

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_slidable: ^3.0.1
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  google_fonts: ^6.1.0
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
